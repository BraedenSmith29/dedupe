name: Release Firefox Addon

on:
  release:
    types: [created]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build release files
      run: npm run publish
      
    - name: Publish to Firefox addons
      uses: browser-actions/public-firefox-addon@latest
      with:
        addon-id: "@dedupe-tab-deduplicator"
        addon-path: "release/dedupe.zip"
        source-path: "release/dedupe-source.zip"
        approval-note: "The source project requires Node.js. Please run `npm run build` and use files found in the `build/` directory."
        auth-api-issuer: ${{ secrets.FIREFOX_AUTH_API_ISSUER }}
        auth-api-secret: ${{ secrets.FIREFOX_AUTH_API_SECRET }}
